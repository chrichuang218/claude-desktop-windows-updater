name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write       # create the GitHub Release
  id-token: write       # OIDC for Sigstore signing
  attestations: write   # publish the build-provenance attestation

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build package
        shell: pwsh
        run: .\scripts\package-release.ps1

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item 'target/release/Claude Desktop Updater.exe' 'dist/Claude Desktop Updater.exe'
          $hash = (Get-FileHash 'dist/Claude Desktop Updater.exe' -Algorithm SHA256).Hash.ToLower()
          "$hash  Claude Desktop Updater.exe" | Out-File -FilePath 'dist/Claude Desktop Updater.exe.sha256' -Encoding ASCII -NoNewline
          Write-Host "SHA-256: $hash"

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/Claude Desktop Updater.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/Claude Desktop Updater.exe
            dist/Claude Desktop Updater.exe.sha256
          body: |
            ## Verifying this build

            This release was built by GitHub Actions from tag `${{ github.ref_name }}`
            (commit `${{ github.sha }}`) and is signed via Sigstore. To verify the
            binary you downloaded matches the one this workflow produced:

            ```
            gh attestation verify "Claude Desktop Updater.exe" --owner vaportail
            ```

            SHA-256 of the published binary is in `Claude Desktop Updater.exe.sha256`.
